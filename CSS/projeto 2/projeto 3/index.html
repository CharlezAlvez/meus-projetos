<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
    <link rel="stylesheet" href="css/index.css">
</head>

<body>

    <div class="container-pai">
        <!--header=cabeçalho-->

        <div class="header">
            <h3>Cadastre seu veículo para vender mais rápdio</h3>
        </div>

        <!--formulario parte A-->
        <div class="form-container">

            <div class="form-header">
                <p>Formulário</p>
            </div>

            <div class="form-body">
                <h1 class="form-title">Venda fácil seu carro!</h1>
                <p>Descreva as caracteristicas e marque os opcionais que ele possui</p>
                   <form action="">
                <!-- input titulo do anuncio-->
                <div class="box-input">
                    <label for="titulo">Título do anúncio <span class="required-filed">*</span></label>
                    <input type="text" name="titulo"
                     id="titulo" 
                     class="block"
                     placeholder="Um título para anunciar seu carro"
                     minlength="1"
                     maxlength="30"
                     required>


                </div>
                
                <div class="box-input">
                    <label for="Preço">Preço:<span class="required-filed">*</span></label>
                    <input type="number" name="Preço"
                     id="preço" 
                     class="block"
                     placeholder="Defina o preço"
                     required>
                </div>

                <!--input descrição-->
                <div class="box-input">
                    <label for="Description">Descrição:<span class="required-filed">*</span></label>
                    <textarea name="Description" name="Description" id="Description" class="block" placeholder="Descreva seu produto"></textarea>
                </div>
                  <!--input de Marca do veiculo-->
                     <div class="box-input">
                    <label for="Brand">Marca<span class="required-filed">*</span></label>
                    <input type="text" name="Brand"
                     id="Brand" 
                     class="block"
                     placeholder="Digite a marca do veiculo"
                     required>
                </div>

                <!--input modelo do veiculo-->
                <div class="box-input">
                    <label for="Modelo">Modelo<span class="required-filed">*</span></label>
                    <input type="text" name="Modelo"
                     id="Modelo" 
                     class="block"
                     placeholder="Digite o modelo do veiculo"
                     required> </div>

                <!--Quilometragem do veiculo-->
                <div class="box-input">
                    <label for="kilometragem">Kilometragem<span class="required-filed">*</span></label>
                    <input type="number" name="kilometragem"
                     id="kilometragem" 
                     class="block"
                     placeholder="Digite o Kilometragem do veiculo"
                     required> </div>
                <!--input de data de compra do veiculo-->
                <div class="box-input">
                    <label for="Purchase">Data de compra<span class="required-filed">*</span></label>
                    <input type="date" name="Purchase"
                     id="Purchase" 
                     class="block"
                     required> </div>
                <!--tipo de câmbio-->
                       <div class="box-input">
                         <p>Tipo de câmbio<span class="required-filed">*</span></p>
                          <input type="radio" id="manual" name="gear">  
                          <label for="manual">Manual</label>
                           <input type="radio" id="auto" name="gear">  
                          <label for="auto">Automático</label>
                        </div>
                   <!--opcionais-->
                   <div class="optional-box">
                         <p>Opcionais<span class="required-filed">*</span></p>
                          <ul class="optional-list">
                            <li>
                                <input type="checkbox" name="optional[]" id="airbag" value="airbag">
                                <label for="airbag">Airbag</label>
                            </li>
                             <li>
                                <input type="checkbox" name="optional[]" id="alarme" value="alarme">
                                <label for="alarme">Alarme</label>
                            </li>
                             <li>
                                <input type="checkbox" name="optional[]" id="ac" value="ac">
                                <label for="ac">Ar Condicionado</label>
                            </li>
                             <li>
                                <input type="checkbox" name="optional[]" id="leather_seat" value="reverse_camera">
                                <label for="reverse_camera">Câmera de Ré</label>
                            </li>
                          </ul>
                        </div>
                        
                        <!--segundo opcional-->
                         <div class="optional-box">
                         
                          <ul class="optional-list">
                            <li>
                                <input type="checkbox" name="optional[]" id="lane_assist" value="lane_assist">
                                <label for="lane_assist">Assistente de pista</label>
                            </li>
                             <li>
                                <input type="checkbox" name="optional[]" id="keyless" value="keyless">
                                <label for="keyless">Partida Keyless</label>
                            </li>
                             <li>
                                <input type="checkbox" name="optional[]" id="smartphone" value="smartphone">
                                <label for="smartphone">Integração com Celular</label>
                            </li>
                             <li>
                                <input type="checkbox" name="optional[]" id="leather_seat" value="leather_seat">
                                <label for="leather_seat">Banco de Couro</label>
                            </li>
                          </ul>
                        </div>
                        
                        <!--fotos do carro-->
                        <div>
                            <div class="box-input"></div>
                            <p>Fotos do Carro: <span class="required-filed">*</span></p>
                            <input type="file" multiple accept="img/png, img/jpg" id="images" name="images" required>
                        </div>


                <input type="submit" value="Enviar" class="btn-submit">
                </form>
            </div>

        </div>

    </div>

















    </div>
</body>

</html>
